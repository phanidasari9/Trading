[server]
# Non-interactive startup; Cloud and CI expect the server to listen immediately.
headless = true

[browser]
gatherUsageStats = false

[theme]
base = "light"
# Robinhood-inspired: green primary, clean white / gray surfaces
primaryColor = "#00C805"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F6F7F8"
textColor = "#1C1C1C"
font = "sans serif"
