[server]
# Non-interactive startup; Cloud and CI expect the server to listen immediately.
headless = true

[browser]
gatherUsageStats = false

[theme]
base = "light"
# Light green — primary buttons, sliders, links, focus ring
primaryColor = "#86efac"
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#f0fdf4"
textColor = "#14532d"
font = "sans serif"
